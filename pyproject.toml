[project]
name = "ComfyUI-Pixaroma"
description = "Creative suite for ComfyUI: 3D Builder, AudioReact, Image Composer, Paint Studio, Save Mp4, Image Crop, Image Compare, Note, Label, Resolution, Preview Image, with layers, transforms, AI background removal, audio-reactive video, and more."
version = "1.3.9"
license = { file = "LICENSE.txt" }

keywords = ["comfyui", "image-editor", "3d", "paint", "layers", "compositor", "compare", "crop", "label", "audio-reactive", "video", "mp4", "pixaroma"]

# Core dependencies are none (PIL/torch come from ComfyUI).
# rembg is optional; the Remove BG button will show an error if missing.
dependencies = []

[project.optional-dependencies]
rembg = ["rembg>=2.0.50", "onnxruntime>=1.14.0"]

[project.urls]
Repository = "https://github.com/pixaroma/ComfyUI-Pixaroma"
Issues     = "https://github.com/pixaroma/ComfyUI-Pixaroma/issues"
YouTube    = "https://www.youtube.com/@pixaroma"

[tool.comfy]
PublisherId = "pixaroma"
DisplayName = "Pixaroma"
Icon = "https://raw.githubusercontent.com/pixaroma/ComfyUI-Pixaroma/main/assets/pixaroma_logo.png"
